<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inventario Institucional Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* Diseño original preservado */
    :root { --azul-tec: #002F6C; --verde-milenio: #82BC00; --bg: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border: #f1f5f9; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); }
    .app-container { max-width: 460px; margin: 0 auto; background: var(--surface); min-height: 100vh; }
    .header { background: linear-gradient(135deg, var(--azul-tec) 70%, var(--verde-milenio) 100%); color: white; padding: 24px 20px; font-weight: 700; }
    .nav-tab { cursor: pointer; padding: 10px; text-align: center; }
    .nav-tab.active { background: #eee; }
    .view { display: none; padding: 20px; }
    .view.active { display: block; }
    .btn-main { background: var(--azul-tec); color: white; width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; }
    #modal-escaner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">Gestión de Almacén</div>
  
  <div style="display:flex; border-bottom:1px solid #ccc;">
    <div class="nav-tab active" onclick="cambiarPestaña('inventario')">Inventario</div>
    <div class="nav-tab" onclick="cambiarPestaña('vender')">Vender</div>
    <div class="nav-tab" onclick="cambiarPestaña('gestionar')">Gestionar</div>
  </div>

  <div id="view-inventario" class="view active">
    <input type="text" id="busqueda-inventario" placeholder="Buscar..." oninput="filtrarInventario()">
    <div id="lista-inventario-cards"></div>
  </div>

  <div id="view-vender" class="view">
    <button class="btn-main" onclick="abrirEscaner('carrito')">📷 ESCANEAR ARTÍCULO</button>
    <div id="elementos-carrito"></div>
    <button class="btn-main" style="margin-top:20px; background:var(--verde-milenio);" onclick="procesarCobro()">💵 COBRAR Y DESCONTAR</button>
  </div>

  <div id="view-gestionar" class="view">
    <button class="btn-main" onclick="verVentasMesActual()">📊 Ver Ventas del Mes</button>
    <div id="tabla-ventas-contenido" style="margin-top:20px;"></div>
  </div>
</div>

<div id="modal-escaner">
  <button onclick="cerrarEscaner()" style="margin:20px;">CERRAR</button>
  <div id="lector-camara" style="width:100%; height:300px;"></div>
</div>

<script>
  const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbxsSsJDbg0KV_CoZI4xCoZjL4JNbOXhI2Cgk8FFXIkU-qg_tdd6NA7XskPW251Kloxx0g/exec";
  let inventarioLocal = [], carrito = [];

  // Al cargar, obtenemos los datos
  window.onload = () => {
    fetch(URL_API_SHEETS).then(r => r.json()).then(d => { inventarioLocal = d; renderizarInventario(d); });
  };

  function cambiarPestaña(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
  }

  function abrirEscaner(ctx) {
    document.getElementById('modal-escaner').style.display = 'block';
    const scanner = new Html5QrcodeScanner("lector-camara", { fps: 10, qrbox: 250 });
    scanner.render((txt) => {
      if(ctx === 'carrito') agregarAlCarritoDirecto(txt);
      cerrarEscaner();
      scanner.clear();
    });
  }

  function cerrarEscaner() { document.getElementById('modal-escaner').style.display = 'none'; }

  function agregarAlCarritoDirecto(cod) {
    let p = inventarioLocal.find(x => x.codigo === cod);
    if(p) {
      carrito.push(p);
      document.getElementById("elementos-carrito").innerHTML += `<div>${p.descripcion}</div>`;
    }
  }

  function procesarCobro() {
    fetch(URL_API_SHEETS, { method: "POST", mode: "no-cors", body: JSON.stringify({ accion: "cobrar", datos: carrito }) })
      .then(() => { alert("Cobro registrado"); carrito = []; });
  }

  function verVentasMesActual() {
    fetch(URL_API_SHEETS + "?obtener=ventas_actuales")
      .then(r => r.json())
      .then(data => {
        let h = data.map(t => `<div>${t.fecha}: ${t.producto} - $${t.total}</div>`).join('');
        document.getElementById("tabla-ventas-contenido").innerHTML = h;
      });
  }
  
  function renderizarInventario(arr) {
     document.getElementById("lista-inventario-cards").innerHTML = arr.map(p => `<div>${p.descripcion} - Stock: ${p.stock}</div>`).join('');
  }
</script>
</body>
</html>
