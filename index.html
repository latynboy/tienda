<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inventario Institucional Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* Mantenemos tus estilos originales intactos */
    :root { --azul-tec: #002F6C; --verde-milenio: #82BC00; --bg: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border: #f1f5f9; --shadow-sm: 0 2px 8px -1px rgba(0,0,0,0.04); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
    .app-container { background: var(--surface); width: 100%; max-width: 460px; min-height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.03); }
    .header { background: linear-gradient(135deg, var(--azul-tec) 70%, var(--verde-milenio) 100%); color: white; padding: 24px 20px; font-size: 22px; font-weight: 700; }
    .navbar { display: flex; background: #f1f5f9; padding: 6px; margin: 16px; border-radius: 14px; gap: 4px; }
    .nav-tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 10px; }
    .nav-tab.active { background: var(--surface); box-shadow: var(--shadow-sm); }
    .view { display: none; padding: 16px; }
    .view.active { display: block; }
    .card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .btn-qty { background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-main { background: var(--azul-tec); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">Gestión de Almacén</div>
  
  <div class="navbar">
    <div class="nav-tab active" id="tab-inventario" onclick="cambiarPestaña('inventario')">Inventario</div>
    <div class="nav-tab" id="tab-vender" onclick="cambiarPestaña('vender')">Vender</div>
  </div>

  <div class="view active" id="view-inventario">
    <div class="card">
      <input type="text" id="busqueda-inventario" placeholder="Buscar..." oninput="filtrarInventario()">
      <div id="info-stock-actual" style="font-weight: 700; color: var(--azul-tec); margin-top: 10px; display: none;"></div>
    </div>
    <div id="lista-inventario-cards"></div>
  </div>

  <div class="view" id="view-vender">
    <div id="elementos-carrito"></div>
    <button class="btn-main" onclick="procesarCobro()">💵 COBRAR Y DESCONTAR</button>
  </div>
</div>

<script>
  const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbxsSsJDbg0KV_CoZI4xCoZjL4JNbOXhI2Cgk8FFXIkU-qg_tdd6NA7XskPW251Kloxx0g/exec";
  let inventarioLocal = [];
  let carrito = [];

  window.onload = () => cargarInventarioReal();

  function cargarInventarioReal() {
    fetch(URL_API_SHEETS).then(r => r.json()).then(d => { inventarioLocal = d; renderizarInventario(d); });
  }

  function renderizarInventario(arr) {
    document.getElementById("lista-inventario-cards").innerHTML = arr.map(p => `
      <div class="card">${p.descripcion} - Stock: ${p.stock}</div>
    `).join('');
  }

  // LOGICA 1: Mostrar stock actual al buscar
  function filtrarInventario() {
    let txt = document.getElementById("busqueda-inventario").value.toLowerCase();
    let p = inventarioLocal.find(x => x.codigo === txt);
    let divStock = document.getElementById("info-stock-actual");
    if(p) {
      divStock.style.display = "block";
      divStock.innerText = "Stock Actual: " + p.stock + " piezas";
    } else {
      divStock.style.display = "none";
    }
  }

  // LOGICA 2: Carrito con botones +/-
  function renderizarCarrito() {
    let cont = document.getElementById("elementos-carrito");
    cont.innerHTML = carrito.map((item, i) => `
      <div class="cart-item">
        <div>${item.descripcion}</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <button class="btn-qty" onclick="cambiarCantidad(${i}, -1)">-</button>
          <span>${item.cantidad}</span>
          <button class="btn-qty" onclick="cambiarCantidad(${i}, 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  function cambiarCantidad(i, delta) {
    carrito[i].cantidad = Math.max(1, carrito[i].cantidad + delta);
    renderizarCarrito();
  }

  function procesarCobro() {
    fetch(URL_API_SHEETS, { method: "POST", mode: "no-cors", body: JSON.stringify({ accion: "cobrar", datos: carrito }) })
      .then(() => { alert("Cobro realizado"); carrito = []; renderizarCarrito(); });
  }

  function cambiarPestaña(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
  }
</script>
</body>
</html>
